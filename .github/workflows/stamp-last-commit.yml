name: Stamp last commit
# Last updated: 2026-07-08

# Runs on every push to main. Writes the triggering commit's SHA and ISO
# date into assets/js/last-commit.json, then commits that file back.
#
# Ported from Repo B's identical workflow — this repo's assets/ directory
# and .github/workflows/ are new as of this port; Repo A's structure was
# previously frozen (see tracker), overridden deliberately for this fix
# to replace the live api.github.com call in fetchLastCommitDate(),
# which was hitting GitHub's unauthenticated rate limit (403, 60 req/hr
# per IP) during active development.
#
# Guard: the commit-back step is itself a push to main. Without the
# "skip if last commit author is the bot" check below, that second push
# would re-trigger this workflow, which would commit again, forever.
on:
  push:
    branches:
      - main

# Least-privilege: only grant write access to repo contents, and only
# for this workflow's own commit-back step.
permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    # Skip entirely if the triggering commit was made by this workflow's
    # own bot identity — breaks the loop described above.
    if: github.event.head_commit.author.name != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history not needed — we only read github.sha, which is
          # already known from the event context, not from git log.
          fetch-depth: 1

      - name: Write last-commit.json
        run: |
          mkdir -p assets/js
          cat > assets/js/last-commit.json << EOF
          {
            "sha": "${{ github.sha }}",
            "shortSha": "$(echo ${{ github.sha }} | cut -c1-7)",
            "date": "${{ github.event.head_commit.timestamp }}",
            "message": $(echo '${{ github.event.head_commit.message }}' | head -1 | jq -Rs .)
          }
          EOF
          cat assets/js/last-commit.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/js/last-commit.json
          # Only commit if the file actually changed — avoids empty
          # commits when re-running or when the date format is identical
          # (won't happen in practice since SHA always changes, but cheap
          # to guard anyway).
          git diff --staged --quiet || git commit -m "chore: stamp last commit [skip ci]"
          git push