<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Aaradhya Dev Tamrakar — Portfolio</title>
  <meta name="description" id="page-desc" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0c0e;
      --bg2:      #111316;
      --bg3:      #161a1f;
      --line:     rgba(255,255,255,0.07);
      --text:     #e8e4dc;
      --muted:    #7a7570;
      --accent:   #c8a96e;
      --accent2:  #7eb8a4;
      --white:    #f5f1ea;
      --serif:    'Cormorant Garamond', Georgia, serif;
      --mono:     'DM Mono', monospace;
      --sans:     'Instrument Sans', sans-serif;
      --nav-scrolled-bg: rgba(11,12,14,0.85);
    }

    html[data-theme="light"] {
      --bg:       #f7f4ef;
      --bg2:      #eeeae2;
      --bg3:      #e5e0d6;
      --line:     rgba(0,0,0,0.09);
      --text:     #2a2520;
      --muted:    #8a8078;
      --accent:   #a07840;
      --accent2:  #4a9080;
      --white:    #1a1510;
      --nav-scrolled-bg: rgba(247,244,239,0.88);
    }

    /* Smooth theme transition — exclude animations that should stay instant */
    body, body * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease; }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; overflow-x: hidden; cursor: none; }

    /* Grain */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 9998; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* Cursor */
    .cursor { position: fixed; top: 0; left: 0; z-index: 9999; pointer-events: none; }
    .cursor-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; position: absolute; transform: translate(-50%,-50%); transition: transform 0.1s; }
    .cursor-ring { width: 32px; height: 32px; border: 1px solid rgba(200,169,110,0.4); border-radius: 50%; position: absolute; transform: translate(-50%,-50%); transition: transform 0.18s ease, width 0.2s, height 0.2s, opacity 0.2s; }
    body:has(a:hover) .cursor-ring, body:has(button:hover) .cursor-ring { width: 48px; height: 48px; border-color: rgba(200,169,110,0.7); }

    /* Nav */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 3rem; border-bottom: 1px solid transparent; transition: border-color 0.3s, background 0.3s, backdrop-filter 0.3s; }
    nav.scrolled { border-color: var(--line); background: var(--nav-scrolled-bg); backdrop-filter: blur(12px); }
    .theme-toggle { width: 36px; height: 36px; background: transparent; border: 1px solid var(--line); border-radius: 2px; cursor: none; display: flex; align-items: center; justify-content: center; color: var(--muted); flex-shrink: 0; }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .theme-toggle svg { width: 15px; height: 15px; pointer-events: none; }
    .icon-sun { display: none; }
    .icon-moon { display: block; }
    html[data-theme="light"] .icon-sun { display: block; }
    html[data-theme="light"] .icon-moon { display: none; }
    .nav-logo { font-family: var(--serif); font-size: 1.1rem; font-weight: 400; letter-spacing: 0.02em; color: var(--white); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }
    .nav-cta { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); text-decoration: none; border: 1px solid rgba(200,169,110,0.35); padding: 0.5rem 1.2rem; border-radius: 2px; transition: background 0.2s, color 0.2s; }
    .nav-cta:hover { background: var(--accent); color: var(--bg); }

    /* Hero */
    #hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 0 3rem; gap: 4rem; position: relative; overflow: hidden; }
    .hero-bg-lines { position: absolute; inset: 0; pointer-events: none; z-index: 0; background: linear-gradient(90deg, var(--line) 1px, transparent 1px), linear-gradient(0deg, var(--line) 1px, transparent 1px); background-size: 80px 80px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%); }
    .hero-glow { position: absolute; top: 20%; right: -10%; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%); pointer-events: none; z-index: 0; }
    .hero-left { position: relative; z-index: 1; }
    .hero-tag { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; opacity: 0; animation: fadeUp 0.8s 0.2s forwards; }
    .hero-tag::before { content: ''; display: block; width: 32px; height: 1px; background: var(--accent); }
    .hero-name { font-family: var(--serif); font-size: clamp(3rem, 5vw, 5.5rem); font-weight: 300; line-height: 1.05; color: var(--white); letter-spacing: -0.01em; opacity: 0; animation: fadeUp 0.9s 0.35s forwards; }
    .hero-name em { font-style: italic; color: var(--accent); }
    .hero-desc { margin-top: 1.8rem; font-size: 0.95rem; line-height: 1.8; color: var(--muted); max-width: 480px; opacity: 0; animation: fadeUp 0.9s 0.5s forwards; }
    .hero-actions { margin-top: 2.5rem; display: flex; gap: 1rem; align-items: center; opacity: 0; animation: fadeUp 0.9s 0.65s forwards; }
    .btn-primary { background: var(--accent); color: var(--bg); font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.85rem 2rem; border-radius: 2px; text-decoration: none; border: none; cursor: none; transition: opacity 0.2s, transform 0.2s; display: inline-block; }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-ghost { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
    .btn-ghost:hover { color: var(--white); }
    .btn-ghost::after { content: '→'; }
    .hero-right { position: relative; z-index: 1; opacity: 0; animation: fadeIn 1.2s 0.7s forwards; }
    .status-card { border: 1px solid var(--line); background: var(--bg2); border-radius: 4px; padding: 2rem; position: relative; }
    .status-card::before { content: ''; position: absolute; top: -1px; left: 2rem; right: 2rem; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
    .status-label { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .status-dot { width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-items { display: flex; flex-direction: column; gap: 1rem; }
    .status-item { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--line); }
    .status-item:last-child { border-bottom: none; padding-bottom: 0; }
    .status-item-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .status-item-value { font-family: var(--serif); font-size: 1rem; font-weight: 400; color: var(--white); text-align: right; max-width: 200px; }

    /* Sections */
    section { padding: 7rem 3rem; position: relative; }
    .section-header { margin-bottom: 4rem; }
    .section-num { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    .section-title { font-family: var(--serif); font-size: clamp(2rem, 3.5vw, 3.2rem); font-weight: 300; color: var(--white); line-height: 1.1; }
    .section-title em { font-style: italic; color: var(--accent); }
    .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--line), transparent); margin: 0 3rem; width: calc(100% - 6rem); }

    /* Projects */
    #projects { background: var(--bg); }
    .projects-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
    .project-card { background: var(--bg2); padding: 2.5rem; transition: background 0.3s; position: relative; overflow: hidden; }
    .project-card:only-child { grid-column: span 2; }
    .project-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; }
    .project-card:hover { background: var(--bg3); }
    .project-card:hover::after { transform: scaleX(1); }
    .project-index { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 1.5rem; opacity: 0.7; }
    .project-title { font-family: var(--serif); font-size: 1.5rem; font-weight: 400; color: var(--white); margin-bottom: 0.75rem; line-height: 1.2; }
    .project-desc { font-size: 0.85rem; line-height: 1.7; color: var(--muted); margin-bottom: 1.5rem; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .project-link { display: inline-flex; align-items: center; gap: 0.4rem; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent2); text-decoration: none; margin-top: 1rem; transition: gap 0.2s; }
    .project-link:hover { gap: 0.6rem; }
    .tag { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--line); padding: 0.3rem 0.6rem; border-radius: 2px; }

    /* Apps */
    #apps { background: var(--bg2); }
    .apps-grid { display: flex; flex-wrap: wrap; gap: 1px; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
    .app-card { background: var(--bg3); padding: 2.5rem; transition: background 0.3s; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 1rem; flex: 1 1 0%; min-width: 320px; }
    .app-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--accent2); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; }
    .app-card:hover { background: var(--bg); }
    .app-card:hover::before { transform: scaleX(1); }
    .app-icon { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .app-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; color: var(--white); line-height: 1.2; }
    .app-desc { font-size: 0.85rem; line-height: 1.7; color: var(--muted); flex: 1; }
    .app-links { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .app-link { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; display: inline-flex; align-items: center; gap: 0.35rem; transition: gap 0.2s; }
    .app-link.primary { color: var(--accent); border: 1px solid rgba(200,169,110,0.3); padding: 0.4rem 0.9rem; border-radius: 2px; transition: background 0.2s, color 0.2s; }
    .app-link.primary:hover { background: var(--accent); color: var(--bg); }
    .app-link.secondary { color: var(--muted); }
    .app-link.secondary:hover { color: var(--accent2); }

    /* Experience */
    #experience { background: var(--bg); }
    .exp-list { display: flex; flex-direction: column; }
    .exp-item { display: grid; grid-template-columns: 1fr 3fr 1fr; align-items: start; gap: 3rem; padding: 2.5rem 0; border-bottom: 1px solid var(--line); }
    .exp-item:first-child { border-top: 1px solid var(--line); }
    .exp-org { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .exp-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; color: var(--white); margin-bottom: 0.5rem; }
    .exp-desc { font-size: 0.85rem; line-height: 1.7; color: var(--muted); }
    .exp-year { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; color: var(--accent); text-align: right; padding-top: 0.2rem; }

    /* Skills */
    #skills { background: var(--bg2); }
    .skills-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
    .skill-group { background: var(--bg2); padding: 2.5rem; }
    .skill-group:hover { background: var(--bg3); }
    .skill-group-title { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }
    .skill-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .skill-row { display: flex; align-items: center; justify-content: space-between; }
    .skill-name { font-family: var(--serif); font-size: 1.1rem; color: var(--white); }
    .skill-bar { width: 120px; height: 2px; background: var(--line); border-radius: 2px; overflow: hidden; }
    .skill-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transform: scaleX(0); transform-origin: left; transition: transform 1s ease; }
    .skill-fill.visible { transform: scaleX(1); }

    /* About */
    #about { background: var(--bg); }
    .about-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; align-items: center; }
    .about-text p { font-size: 0.95rem; line-height: 1.9; color: var(--muted); margin-bottom: 1.2rem; }
    .about-text p strong { color: var(--text); font-weight: 400; }
    .about-stats { display: flex; flex-direction: column; gap: 0; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-bottom: 1px solid var(--line); }
    .stat-row:first-child { border-top: 1px solid var(--line); }
    .stat-num { font-family: var(--serif); font-size: 2.5rem; font-weight: 300; color: var(--white); }
    .stat-num span { font-size: 1.2rem; color: var(--accent); }
    .stat-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: right; }

    /* Contact */
    #contact { background: var(--bg2); }
    .contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 6rem; }
    .contact-tagline { font-family: var(--serif); font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 300; color: var(--white); line-height: 1.3; margin-bottom: 1.5rem; }
    .contact-tagline em { font-style: italic; color: var(--accent); }
    .contact-note { font-size: 0.88rem; line-height: 1.8; color: var(--muted); }
    .contact-links { display: flex; flex-direction: column; gap: 0; }
    .contact-link { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-bottom: 1px solid var(--line); text-decoration: none; transition: padding-left 0.3s; }
    .contact-link:first-child { border-top: 1px solid var(--line); }
    .contact-link:hover { padding-left: 0.5rem; }
    .contact-link-label { font-family: var(--serif); font-size: 1.2rem; color: var(--white); }
    .contact-link-detail { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.08em; color: var(--muted); }
    .contact-link:hover .contact-link-detail { color: var(--accent); }
    .contact-link-arrow { color: var(--muted); font-size: 1rem; transition: transform 0.2s, color 0.2s; }
    .contact-link:hover .contact-link-arrow { transform: translate(4px, -4px); color: var(--accent); }

    /* Footer */
    footer { padding: 2rem 3rem; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; color: var(--muted); }
    .footer-socials { display: flex; gap: 1.5rem; }
    .footer-socials a { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-socials a:hover { color: var(--accent); }

    /* Animations */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* Mobile */
    @media (max-width: 900px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links { display: none; }
      #hero { grid-template-columns: 1fr; padding: 8rem 1.5rem 4rem; gap: 3rem; }
      .hero-right { order: -1; }
      section { padding: 5rem 1.5rem; }
      .projects-grid { grid-template-columns: 1fr; }
      .apps-grid { grid-template-columns: 1fr; }
      .exp-item { grid-template-columns: 1fr; gap: 0.5rem; }
      .exp-year { text-align: left; }
      .skills-layout { grid-template-columns: 1fr; }
      .about-layout, .contact-layout { grid-template-columns: 1fr; gap: 3rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
      .divider { margin: 0 1.5rem; width: calc(100% - 3rem); }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor">
    <div class="cursor-ring" id="cursorRing"></div>
    <div class="cursor-dot" id="cursorDot"></div>
  </div>

  <nav id="nav">
    <a href="#hero" class="nav-logo" id="nav-logo">ADT<span>.</span></a>
    <ul class="nav-links" id="nav-links"></ul>
    <a href="#contact" class="nav-cta">Connect</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </nav>

  <section id="hero">
    <div class="hero-bg-lines"></div>
    <div class="hero-glow"></div>
    <div class="hero-left">
      <div class="hero-tag" id="hero-tag"></div>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-desc" id="hero-desc"></p>
      <div class="hero-actions">
        <a href="#projects" class="btn-primary">View Work</a>
        <a href="#contact" class="btn-ghost">Get in touch</a>
      </div>
    </div>
    <div class="hero-right">
      <div class="status-card">
        <div class="status-label"><span class="status-dot"></span> Currently Active</div>
        <div class="status-items" id="status-items"></div>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <section id="projects">
    <div class="section-header reveal">
      <div class="section-num">01 / Projects</div>
      <h2 class="section-title">Selected <em>Engineering Work</em></h2>
    </div>
    <div class="projects-grid reveal" id="projects-grid"></div>
  </section>

  <div class="divider"></div>

  <section id="apps">
    <div class="section-header reveal">
      <div class="section-num">02 / Apps</div>
      <h2 class="section-title">Live <em>Applications</em></h2>
    </div>
    <div class="apps-grid reveal" id="apps-grid"></div>
  </section>

  <div class="divider"></div>

  <section id="experience">
    <div class="section-header reveal">
      <div class="section-num">03 / Experience</div>
      <h2 class="section-title">Roles &amp; <em>Contributions</em></h2>
    </div>
    <div class="exp-list" id="exp-list"></div>
  </section>

  <div class="divider"></div>

  <section id="skills">
    <div class="section-header reveal">
      <div class="section-num">04 / Skills</div>
      <h2 class="section-title">Technical <em>Expertise</em></h2>
    </div>
    <div class="skills-layout reveal" id="skills-layout"></div>
  </section>

  <div class="divider"></div>

  <section id="about">
    <div class="about-layout">
      <div class="about-text reveal" id="about-text"></div>
      <div class="about-stats reveal" id="about-stats"></div>
    </div>

  // ── Theme toggle ────────────────────────────────────────
  (function() {
    const htmlEl = document.documentElement;
    const btn = document.getElementById('themeToggle');
    const saved = localStorage.getItem('adt-theme') || 'dark';
    htmlEl.setAttribute('data-theme', saved);
    btn.addEventListener('click', () => {
      const next = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      htmlEl.setAttribute('data-theme', next);
      localStorage.setItem('adt-theme', next);
    });
  })();

  // ── Cursor ──────────────────────────────────────────────────
  const dot  = document.getElementById('cursorDot');
  const ring = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animateCursor() {
    dot.style.left = mx + 'px'; dot.style.top = my + 'px';
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animateCursor);
  })();

  // ── Nav scroll ──────────────────────────────────────────────
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 50));

  // ── Reveal on scroll ────────────────────────────────────────
  const revealObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

  // ── Skill bars (re-observe after render) ────────────────────
  const skillObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.querySelectorAll('.skill-fill').forEach(b => b.classList.add('visible'));
    });
  }, { threshold: 0.3 });
  document.querySelectorAll('.skill-group').forEach(g => skillObs.observe(g));
